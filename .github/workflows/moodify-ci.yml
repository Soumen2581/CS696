# Runs when a Moodify final project lives at repo root: ./moodify/
# Copy or submodule your moodify app there, then pushes under moodify/ trigger this job.

name: Moodify CI

on:
  push:
    branches:
      - main
    paths:
      - 'moodify/**'
      - '.github/workflows/moodify-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'moodify/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moodify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: moodify/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          CI: true
          NODE_ENV: test
          JWT_SECRET: ci-jwt-secret-not-for-production
